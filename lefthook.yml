output:
  - meta           # Print lefthook version
  - summary        # Print summary block (successful and failed steps)
  - empty_summary  # Print summary heading when there are no steps to run
  - success        # Print successful steps
  - failure        # Print failed steps printing
  - execution      # Print any execution logs
  #- execution_out  # Print execution output
  #- execution_info # Print `EXECUTE > ...` logging
  - skips          # Print "skip" (i.e. no files matched)

pre-commit:
  commands:
    tesla-interface-tests:
      run: |
        stashed=0
        status=0

        restore_stash() {
          if [ "$stashed" -eq 1 ]; then
            if ! git stash pop --quiet >/dev/null; then
              echo "Failed to restore unstaged changes from stash."
              status=1
            fi
          fi
        }

        trap restore_stash EXIT INT TERM

        if ! git diff --quiet -- || [ -n "$(git ls-files --others --exclude-standard)" ]; then
          git stash push --keep-index --include-untracked --quiet --message lefthook-pre-commit-staged-only
          stashed=1
        fi

        .venv/bin/ruff check . || status=$?
        .venv/bin/python -m pytest -q -n 0 'opendbc/car/tests/test_car_interfaces.py::TestCarInterfaces::test_car_interfaces[TESLA_MODEL_3]' || status=$?

        exit "$status"

test:
  parallel: true
  commands:
    # *** static analysis
    ruff:
      run: ruff check .
    ty:
      run: ty check
    codespell:
      run: codespell {files} -L tge,stdio -S *.dbc --ignore-words=.codespellignore
      files: git ls-tree -r HEAD --name-only
    cpplint:
      run: cpplint --exclude=opendbc/can/*_pyx.cpp --recursive --quiet --counting=detailed --linelength=240 --filter=-build,-legal,-readability,-runtime,-whitespace,+build/include_subdir,+build/forward_decl,+build/include_what_you_use,+build/deprecated,+whitespace/comma,+whitespace/line_length,+whitespace/empty_if_body,+whitespace/empty_loop_body,+whitespace/empty_conditional_body,+whitespace/forcolon,+whitespace/parens,+whitespace/semicolon,+whitespace/tab,+readability/braces opendbc/
    misra:
      run: opendbc/safety/tests/misra/test_misra.sh

    # *** tests ***
    pytest:
      run: pytest -n8
